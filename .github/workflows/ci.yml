name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    name: Lint, Build, and Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Ensure deterministic test DB directory exists
        run: mkdir -p tmp

      - name: Run lint
        run: npm run lint

      - name: Run build
        run: npm run build

      - name: Run integration tests (capture logs)
        id: integration
        continue-on-error: true
        env:
          TEST_DATABASE_URL: tmp/test.db
          DATABASE_URL: tmp/test.db
        run: |
          npm run test:integration 2>&1 | tee integration-test.log
          exit_code=${PIPESTATUS[0]}
          echo "exit_code=${exit_code}" >> "$GITHUB_OUTPUT"

      - name: Upload integration logs on failure
        if: steps.integration.outputs.exit_code != '0'
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-logs
          path: |
            integration-test.log
            tmp/test.db
          if-no-files-found: warn
          retention-days: 7

      - name: Fail workflow when integration tests fail
        if: steps.integration.outputs.exit_code != '0'
        run: |
          echo "Integration tests failed. See uploaded artifact: integration-test-logs"
          exit 1
