# Canonical doc: README.md (Production Deployment Runbook)
name: Smoke Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  smoke-test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Run smoke test
      env:
        NODE_ENV: development
        JWT_SECRET: ca09b7e4b67855a17bbf2d065ee6e7bbf0099a3774df490e456a64efd8e9c357
        DATABASE_URL: ./tmp/post-deploy-smoke.db
        PORT: 3100
      run: |
        npm run dev &
        sleep 10
        curl -f http://127.0.0.1:3100/api/csrf-token || (echo "Smoke test failed" && exit 1)